<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro · OpenM</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Web Awesome 3.9+ (issue #127) — design system base -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@awesome.me/awesome@3/css/awesome.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
    <main class="auth-card">
        <header class="auth-brand">
            <div class="logo"><i data-lucide="git-fork"></i></div>
            <h1>OpenM</h1>
            <p class="auth-subtitle">Criar nova conta</p>
        </header>

        <form id="register-form" class="auth-form" autocomplete="on">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autofocus
                   placeholder="voce@exemplo.com" aria-describedby="register-error">

            <label for="password">Senha <span class="auth-hint">(mínimo 8 caracteres)</span></label>
            <input type="password" id="password" name="password" required minlength="8"
                   placeholder="••••••••" aria-describedby="register-error">

            <label for="password2">Confirmar senha</label>
            <input type="password" id="password2" name="password2" required minlength="8"
                   placeholder="••••••••" aria-describedby="register-error">

            <div id="register-error" class="auth-error" role="alert" hidden></div>

            <button type="submit" class="btn primary auth-submit" aria-label="Criar nova conta">
                <i data-lucide="user-plus"></i> Criar conta
            </button>

            <p class="auth-switch">
                Já tem conta? <a href="{{ url_for('frontend.login_page') }}">Entrar</a>
            </p>
        </form>
    </main>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <!-- Lucide icons (issue #127) — loader converts data-lucide="x" → inline SVG -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>

    <!-- ARIA live regions (issue #128) -->
    <div id="sr-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <div id="sr-alert" class="sr-only" aria-live="assertive" aria-atomic="true"></div>
</body>
</html>
