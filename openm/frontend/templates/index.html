<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenM - OSINT Graph Investigation</title>

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Web Awesome 3.9+ (issue #127) — design system base -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@awesome.me/awesome@3/css/awesome.min.css" />

    <!-- Cytoscape.js + plugins (locais para ordem determinística) -->
    <script src="{{ url_for('static', filename='vendor/cytoscape.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/cytoscape-cose-bilkent.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/cytoscape-cxtmenu.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/cytoscape-edgehandles.js') }}"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-shell">
        <!-- ============================================ TOPBAR -->
        <header class="topbar">
            <div class="brand">
                <div class="logo"><i data-lucide="git-fork"></i></div>
                <span>OpenM</span>
            </div>
            <div class="toolbar">
                <button class="btn icon" id="btn-fit" title="Ajustar à tela (F)"><i data-lucide="maximize-2"></i></button>
                <button class="btn icon" id="btn-clear" title="Limpar grafo" data-roles="admin,analyst"><i data-lucide="trash-2"></i></button>
                <button class="btn icon" id="btn-undo" title="Desfazer (Ctrl+Z)" data-roles="admin,analyst"><i data-lucide="rotate-ccw"></i></button>
                <button class="btn icon" id="btn-redo" title="Refazer (Ctrl+Y)" data-roles="admin,analyst"><i data-lucide="rotate-cw"></i></button>
                <button class="btn icon" id="btn-save" title="Salvar investigação" data-roles="admin,analyst"><i data-lucide="save"></i></button>
                <button class="btn icon" id="btn-export" title="Exportar JSON"><i data-lucide="download"></i></button>
                <button class="btn icon" id="btn-import" title="Importar JSON" data-roles="admin,analyst"><i data-lucide="upload"></i></button>
                <input type="file" id="file-input" accept="application/json" style="display:none">
            </div>
            <div class="spacer"></div>
            <div class="conn"><span class="dot" id="dot-neo4j"></span><span>Neo4j</span></div>
            <div class="conn"><span class="dot" id="dot-pg"></span><span>Postgres</span></div>
            <div class="spacer"></div>
            <div class="theme-toggle">
                <button class="btn icon" id="btn-theme" type="button" title="Alternar tema (Ctrl+Shift+T)" aria-label="Alternar entre tema claro e escuro">
                    <i data-lucide="moon" id="theme-icon" aria-hidden="true"></i>
                </button>
            </div>
            <div class="user-info">
                <i data-lucide="circle-user"></i>
                <span id="user-email"></span>
                <span id="user-role" class="role-badge" data-role=""></span>
                <a class="btn icon" id="btn-logout" href="/logout" title="Sair">
                    <i data-lucide="log-out"></i>
                </a>
            </div>
        </header>

        <!-- ============================================ WORKSPACE -->
        <main class="workspace">
            <!-- ====== PALETTE (ESQ) ====== -->
            <aside class="sidebar left" id="palette">
                <div class="sidebar-section">
                    <h3><i data-lucide="search"></i>Buscar</h3>
                    <div class="search-bar">
                        <i data-lucide="search"></i>
                        <input type="text" id="search-input" placeholder="Filtrar entidades...">
                    </div>
                </div>
                <div class="sidebar-section">
                    <h3><i data-lucide="shapes"></i>Entidades</h3>
                    <div id="palette-items"></div>
                </div>
                <div class="sidebar-section">
                    <h3><i data-lucide="history"></i>Investigações</h3>
                    <input type="text" id="inv-title" placeholder="Título...">
                    <textarea id="inv-desc" rows="2" placeholder="Descrição..." style="margin-top:0.4rem"></textarea>
                    <button class="btn primary" id="btn-create-inv" style="width:100%; margin-top:0.4rem" data-roles="admin,analyst">
                        <i data-lucide="plus"></i>Nova Investigação
                    </button>
                    <div class="inv-filters">
                        <input type="text" id="inv-search" placeholder="Buscar..." class="inv-filter-input">
                        <select id="inv-status-filter" class="inv-filter-select">
                            <option value="active">Ativas</option>
                            <option value="archived">Arquivadas</option>
                            <option value="all">Todas</option>
                        </select>
                        <select id="inv-sort" class="inv-filter-select">
                            <option value="-updated_at">Recente</option>
                            <option value="title">Título (A-Z)</option>
                            <option value="-created_at">Criação</option>
                        </select>
                    </div>
                    <ul class="list" id="investigations-list"></ul>
                </div>
                <div class="sidebar-section">
                    <h3><i data-lucide="key"></i>API Keys</h3>
                    <select id="key-service" data-roles="admin,analyst">
                        <!-- options populados dinamicamente por loadKeyServices() -->
                    </select>
                    <input type="text" id="key-value" placeholder="Chave..." style="margin-top:0.4rem" data-roles="admin,analyst">
                    <select id="key-type" style="margin-top:0.4rem" data-roles="admin,analyst">
                        <option value="free">Free</option>
                        <option value="paid">Paid</option>
                    </select>
                    <button class="btn primary" id="btn-save-key" style="width:100%; margin-top:0.4rem" data-roles="admin,analyst">
                        <i data-lucide="save"></i>Salvar Chave
                    </button>
                    <ul class="list" id="keys-list"></ul>
                </div>

                <!-- ========== Administração (issue #42) ==========
                     Visível apenas para role='admin' via data-roles.
                     A UI esconde via permissions.js + o backend revalida
                     com @require_role("admin") em openm/api/admin.py.
                -->
                <div class="sidebar-section" id="admin-section" data-roles="admin">
                    <h3><i data-lucide="users"></i>Administração</h3>
                    <button class="btn small" id="admin-refresh" style="width:100%; margin-bottom:0.4rem">
                        <i data-lucide="refresh-cw"></i>Atualizar
                    </button>
                    <div id="admin-error" class="admin-error" hidden></div>
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Criado</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="admin-users-tbody">
                            <tr><td colspan="4" class="admin-empty">Carregando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </aside>

            <!-- ====== CANVAS (CENTRO) ====== -->
            <section class="canvas-area">
                <div class="canvas-overlay">
                    <button class="btn icon" id="ov-fit" title="Ajustar"><i data-lucide="maximize-2"></i></button>
                    <button class="btn icon" id="ov-zoom-in" title="Zoom +"><i data-lucide="plus"></i></button>
                    <button class="btn icon" id="ov-zoom-out" title="Zoom -"><i data-lucide="minus"></i></button>
                    <button class="btn icon" id="ov-relayout" title="Reorganizar"><i data-lucide="git-fork"></i></button>
                </div>
                <div class="canvas-overlay bottom-right">
                    <div class="zoom-info"><span id="zoom-level">100%</span></div>
                    <div class="zoom-info" style="border-top:1px solid var(--border)">
                        <span id="node-count">0</span> nós
                    </div>
                </div>
                <div id="cy"></div>
            </section>

            <!-- ====== INSPECTOR (DIR) ====== -->
            <aside class="sidebar right" id="inspector">
                <div id="inspector-content">
                    <div class="inspector-empty">
                        <i data-lucide="info" style="font-size:2rem; margin-bottom:0.5rem; display:block"></i>
                        Selecione um nó ou aresta para ver detalhes
                    </div>
                </div>
            </aside>
        </main>

        <!-- ============================================ STATUSBAR -->
        <footer class="statusbar">
            <span id="status-msg">Pronto.</span>
            <div class="spacer"></div>
            <span id="save-status" title="Status do auto-save">—</span>
            <div class="spacer"></div>
            <span id="status-hint">Arraste entidades da paleta · Botão direito para ações</span>
        </footer>
    </div>

    <!-- Container de modais -->
    <div id="modal-root"></div>
    <div id="cxtmenu-root"></div>
    <div id="drag-ghost-root"></div>

    <!-- Scripts principais -->
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/icons.js') }}"></script>
    <script src="{{ url_for('static', filename='js/permissions.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modals.js') }}"></script>
    <script src="{{ url_for('static', filename='js/inspector.js') }}"></script>
    <script src="{{ url_for('static', filename='js/palette.js') }}"></script>
    <script src="{{ url_for('static', filename='js/graph.js') }}"></script>
    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <!-- Web Awesome 3.9+ (issue #127) — must load before app.js -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@awesome.me/awesome@3/dist/awesome.loader.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <!-- Lucide icons (issue #127) — loader converts data-lucide="x" → inline SVG -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
