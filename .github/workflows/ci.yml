name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs anteriores da mesma branch/PR (evita fila acumulada).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 openm/ tests/ --max-line-length=120 --extend-ignore=E203,W503

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: openm
          POSTGRES_PASSWORD: openm
          POSTGRES_DB: openm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/testpassword
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget -qO- http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

    env:
      DATABASE_URL: postgresql://openm:openm@localhost:5432/openm_test
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
      SECRET_KEY: ci-test-secret
      JWT_SECRET: ci-test-jwt-secret
      JWT_ALGORITHM: HS256
      FLASK_ENV: testing

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Apply database migrations (Alembic)
        # Idempotente — apenas roda ``flask db upgrade``. Em PRs futuros
        # não deve estampar revisions novas (issue #36). CI roda contra
        # o serviço postgres acima, unit tests continuam em SQLite.
        env:
          FLASK_APP: openm.app:app
          DATABASE_URL: postgresql://openm:openm@localhost:5432/openm_test
        run: flask db upgrade

      - name: Wait for Neo4j
        # Health check do Docker nem sempre detecta Bolt pronto. Retry manual.
        run: |
          for i in {1..30}; do
            if wget -qO- http://localhost:7474 > /dev/null 2>&1; then
              echo "Neo4j HTTP pronto após ${i}s"
              break
            fi
            echo "Aguardando Neo4j... (${i}/30)"
            sleep 2
          done

      - name: Run tests
        run: |
          pytest --cov=openm --cov-report=term-missing --cov-report=xml -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}